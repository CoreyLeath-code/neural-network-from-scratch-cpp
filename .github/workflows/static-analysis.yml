name: Static Analysis

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  clang-format:
    name: clang-format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install clang-format
        run: sudo apt-get update && sudo apt-get install -y clang-format
      - name: Verify C++ files are parseable by clang-format
        run: |
          mapfile -d '' files < <(find src tests benchmarks -type f \( -name '*.cpp' -o -name '*.hpp' \) -print0)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No C++ source files found."
            exit 1
          fi
          clang-format --dry-run "${files[@]}"

  clang-tidy:
    name: clang-tidy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build libgtest-dev clang-tidy
      - name: Configure compile database
        run: cmake -S src -B build-tidy -G Ninja -DCMAKE_BUILD_TYPE=Debug -DNN_ENABLE_WARNINGS_AS_ERRORS=OFF
      - name: Analyze project sources
        run: |
          run-clang-tidy \
            -p build-tidy \
            -header-filter='^(src|tests)/' \
            -checks='-*,clang-analyzer-*,bugprone-*' \
            src tests

  cppcheck:
    name: cppcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install cppcheck
        run: sudo apt-get update && sudo apt-get install -y cppcheck
      - name: Analyze
        run: |
          cppcheck \
            --enable=warning,performance,portability \
            --error-exitcode=1 \
            --std=c++17 \
            --suppress=missingIncludeSystem \
            --suppress=unusedFunction \
            --inline-suppr \
            src tests
