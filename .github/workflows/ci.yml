name: NeuralNet Enterprise CI

on: [push, pull_request]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libgtest-dev

      - name: Build and Test
        run: |
          # Use GITHUB_WORKSPACE to ensure we point to the repo root
          cmake -S "$GITHUB_WORKSPACE" -B build
          cmake --build build
          
          # Run the test executable
          ./build/test_neural_network

      - name: Memory Safety (Valgrind)
        run: |
          # Run valgrind to check for memory leaks
          valgrind --leak-check=full --error-exitcode=1 ./build/test_neural_network
