name: NeuralNet Enterprise CI

on: [push, pull_request]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libgtest-dev clang-tidy valgrind doxygen

      - name: Build and Test
        run: |
          # Clean build to ensure fresh header resolution
          rm -rf build && mkdir build && cd build
          
          # Configure with Sanitizers
          cmake -D CMAKE_CXX_FLAGS="-fsanitize=address,undefined" ..
          
          # Build
          make
          
          # Run Unit Tests
          ./test_neural_network

      - name: Memory Safety (Valgrind)
        run: |
          valgrind --leak-check=full --error-exitcode=1 ./build/test_neural_network

      - name: Static Analysis
        run: |
          clang-tidy src/*.cpp -header-filter=.* -- -Iinclude
