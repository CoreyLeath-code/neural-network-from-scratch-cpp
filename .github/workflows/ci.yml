name: NeuralNet Enterprise CI

on: [push, pull_request]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Fix Apt Repositories & Install Dependencies
        run: |
          # Remove problematic Microsoft/Azure repositories that cause signature errors
          sudo rm -f /etc/apt/sources.list.d/azure-cli.list
          sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list
          
          # Now update and install
          sudo apt-get update
          sudo apt-get install -y cmake libgtest-dev clang-tidy valgrind

      - name: Build and Test
        run: |
          # Use the dynamic find approach to guarantee we locate CMakeLists.txt
          PROJECT_ROOT=$(find . -name "CMakeLists.txt" -exec dirname {} \;)
          cmake -S "$PROJECT_ROOT" -B build
          cmake --build build
          ./build/test_neural_network

      - name: Memory Safety (Valgrind)
        run: |
          valgrind --leak-check=full --error-exitcode=1 ./build/test_neural_network

      - name: Static Analysis
        run: |
          # -I. ensures all include paths starting from root are found
          clang-tidy src/*.cpp -header-filter=.* -- -I.
