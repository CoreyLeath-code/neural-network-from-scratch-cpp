name: NeuralNet Enterprise CI

on: [push, pull_request]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libgtest-dev clang-tidy valgrind

      - name: Build and Test
        run: |
          # Use modern path-agnostic CMake commands
          # -S . points to the source directory (root)
          # -B build points to the output directory
          cmake -S . -B build
          cmake --build build
          
          # Run the test executable directly from the build directory
          ./build/test_neural_network

      - name: Memory Safety (Valgrind)
        run: |
          valgrind --leak-check=full --error-exitcode=1 ./build/test_neural_network

      - name: Static Analysis
        run: |
          # Run clang-tidy from the project root
          # -I. ensures all include paths starting from root are found
          clang-tidy src/*.cpp -header-filter=.* -- -I.
