name: NeuralNet Enterprise CI

on: [push, pull_request]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo rm -f /etc/apt/sources.list.d/azure-cli.list
          sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list
          sudo apt-get update
          sudo apt-get install -y cmake libgtest-dev clang-tidy valgrind

      - name: Build and Test
        run: |
          # 1. Dynamically locate the directory containing CMakeLists.txt
          # This traverses the nested structure created by GitHub Actions
          ROOT_DIR=$(find . -name "CMakeLists.txt" -exec dirname {} \; | head -n 1)
          echo "CMakeLists.txt found in: $ROOT_DIR"
          
          # 2. Clean build and point CMake to the located directory
          mkdir build
          cmake -S "$ROOT_DIR" -B build
          
          # 3. Build
          cmake --build build
          
          # 4. Run tests
          ./build/test_neural_network

      - name: Memory Safety (Valgrind)
        run: |
          valgrind --leak-check=full --error-exitcode=1 ./build/test_neural_network

      - name: Static Analysis
        run: |
          clang-tidy src/*.cpp -header-filter=.* -- -I.
