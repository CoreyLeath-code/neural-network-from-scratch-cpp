name: NeuralNet Enterprise CI

on: [push, pull_request]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo rm -f /etc/apt/sources.list.d/azure-cli.list
          sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list
          sudo apt-get update
          sudo apt-get install -y cmake libgtest-dev clang-tidy valgrind

      - name: Build and Test
        run: |
          # 1. Dynamically find the directory containing CMakeLists.txt
          # This handles any nested structure created by actions/checkout
          PROJECT_ROOT=$(find . -name "CMakeLists.txt" -exec dirname {} \; | head -n 1)
          echo "Building from project root: $PROJECT_ROOT"
          
          # 2. Build in a dedicated directory
          mkdir build
          
          # 3. Configure using the found project root
          cmake -S "$PROJECT_ROOT" -B build
          
          # 4. Build
          cmake --build build
          
          # 5. Run tests (adjusting for build directory path)
          ./build/test_neural_network

      - name: Memory Safety (Valgrind)
        run: |
          valgrind --leak-check=full --error-exitcode=1 ./build/test_neural_network

      - name: Static Analysis
        run: |
          clang-tidy src/*.cpp -header-filter=.* -- -I.
