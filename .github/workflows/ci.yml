name: NeuralNet Enterprise CI

on: [push, pull_request]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo rm -f /etc/apt/sources.list.d/azure-cli.list
          sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list
          sudo apt-get update
          sudo apt-get install -y cmake libgtest-dev clang-tidy valgrind

      - name: Build and Test
        run: |
          # Dynamically find the folder containing CMakeLists.txt
          PROJECT_DIR=$(find . -name "CMakeLists.txt" -exec dirname {} \; | head -n 1)
          echo "Building in: $PROJECT_DIR"
          
          # Configure and build using that directory
          cmake -S "$PROJECT_DIR" -B build
          cmake --build build
          
          # Run tests from the build directory
          ./build/test_neural_network

      - name: Memory Safety (Valgrind)
        run: |
          valgrind --leak-check=full --error-exitcode=1 ./build/test_neural_network

      - name: Static Analysis
        run: |
          # Run clang-tidy
          clang-tidy src/*.cpp -header-filter=.* -- -I.
