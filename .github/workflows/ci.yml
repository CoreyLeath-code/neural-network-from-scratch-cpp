name: NeuralNet Enterprise CI

on: [push, pull_request]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # THIS STEP IS CRITICAL: It will show us the true path in the logs
      - name: Debug File Tree
        run: ls -R

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libgtest-dev clang-tidy valgrind

      - name: Build and Test
        run: |
          # The 'find' command will locate the directory containing CMakeLists.txt
          PROJECT_ROOT=$(find . -name "CMakeLists.txt" -exec dirname {} \;)
          echo "Found project root at: $PROJECT_ROOT"
          
          # Now we use that dynamic path to run cmake
          cmake -S "$PROJECT_ROOT" -B build
          cmake --build build
          
          # Run tests
          ./build/test_neural_network

      - name: Memory Safety (Valgrind)
        run: |
          valgrind --leak-check=full --error-exitcode=1 ./build/test_neural_network
