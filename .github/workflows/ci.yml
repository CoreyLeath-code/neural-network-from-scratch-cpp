name: NeuralNet Enterprise CI

on: [push, pull_request]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libgtest-dev

      - name: Build and Test
        run: |
          # Dynamically find the folder containing CMakeLists.txt
          # This handles the nesting issue by searching the entire workspace
          PROJECT_ROOT=$(find . -name "CMakeLists.txt" -exec dirname {} \; | head -n 1)
          echo "Found project root at: $PROJECT_ROOT"
          
          # Create build directory inside the project root
          mkdir -p "$PROJECT_ROOT/build"
          
          # Configure and build
          cmake -S "$PROJECT_ROOT" -B "$PROJECT_ROOT/build"
          cmake --build "$PROJECT_ROOT/build"
          
          # Run tests
          "$PROJECT_ROOT/build/test_neural_network"

      - name: Memory Safety (Valgrind)
        run: |
          # Use the same dynamic path for Valgrind
          PROJECT_ROOT=$(find . -name "CMakeLists.txt" -exec dirname {} \; | head -n 1)
          valgrind --leak-check=full --error-exitcode=1 "$PROJECT_ROOT/build/test_neural_network"
