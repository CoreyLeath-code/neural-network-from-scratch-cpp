name: NeuralNet Enterprise CI

on: [push, pull_request]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libgtest-dev

      - name: Build and Test
        run: |
          # Create and enter build directory
          mkdir build && cd build
          
          # Explicitly configure using the current directory as the source
          cmake ..
          
          # Build
          make
          
          # Run tests
          ./test_neural_network
