name: NeuralNet Enterprise CI

on: [push, pull_request]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libgtest-dev clang-tidy valgrind

      - name: Build and Test
        run: |
          rm -rf build && mkdir build && cd build
          # Configure with project root correctly handled by CMakeLists.txt
          cmake ..
          make
          ./test_neural_network

      - name: Memory Safety (Valgrind)
        run: |
          valgrind --leak-check=full --error-exitcode=1 ./build/test_neural_network

      - name: Static Analysis
        run: |
          # Ensure clang-tidy looks at include/
          clang-tidy src/*.cpp -header-filter=.* -- -Iinclude
