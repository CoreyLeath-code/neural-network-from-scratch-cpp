name: NeuralNet Enterprise CI

on: [push, pull_request]

jobs:
  build-test-secure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Tier 1 & 9: Infrastructure & Build Environment
      - name: Install Dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y cmake libgtest-dev clang-tidy valgrind doxygen
          
      # Tier 3: Static Analysis
      - name: Static Analysis (Clang-Tidy)
        run: clang-tidy src/*.cpp -header-filter=.* -- -Iinclude

      # Tier 7: Compiler Sanitizers
      - name: Configure (Sanitizers Enabled)
        run: cmake -B build -D CMAKE_CXX_FLAGS="-fsanitize=address,undefined"

      - name: Build
        run: cmake --build build

      # Tier 2: Unit Testing
      - name: Run Unit Tests
        run: ./build/test_neural_network

      # Tier 4: Memory Safety
      - name: Memory Safety (Valgrind)
        run: valgrind --leak-check=full --error-exitcode=1 ./build/test_neural_network

      # Tier 5: Performance Benchmarking
      - name: Performance Benchmarking
        run: ./build/benchmark_nn --benchmark_format=json > results.json

      # Tier 8: Security Audit
      - name: Security Audit (OSV-Scanner)
        run: |
          curl -sSLo osv-scanner https://github.com/google/osv-scanner/releases/latest/download/osv-scanner_linux_amd64
          chmod +x osv-scanner
          ./osv-scanner -r .

      # Tier 6: Documentation Generation
      - name: Generate Doxygen Docs
        run: doxygen Doxyfile
