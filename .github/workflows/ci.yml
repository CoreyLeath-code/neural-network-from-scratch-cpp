name: C++ Professional CI Pipeline

on: [push, pull_request]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libgtest-dev clang-tidy valgrind

      - name: Static Analysis (Clang-Tidy)
        run: |
          # Run tidy on source files to catch unsafe practices
          clang-tidy src/*.cpp -header-filter=.* -- -Iinclude

      - name: Configure and Build
        run: |
          mkdir build && cd build
          cmake -DCMAKE_CXX_COMPILER=g++ ..
          make

      - name: Run Unit Tests
        run: ./build/test_neural_network

      - name: Memory Safety Check (Valgrind)
        run: |
          # Detects memory leaks and invalid memory accesses
          valgrind --leak-check=full --error-exitcode=1 ./build/test_neural_network
